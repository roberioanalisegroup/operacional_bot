<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setor Pessoal</title>
  <meta name="auth-root" content="/">
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/auth-guard.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0b;
      --panel: #141414;
      --border: #2d2d2d;
      --text: #f5f1e8;
      --muted: #b8b0a4;
      --gold: #e9af29;
      --gold-soft: rgba(233, 175, 41, 0.12);
      --shadow: 0 16px 34px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(233, 175, 41, 0.18), transparent 24%),
        linear-gradient(180deg, #050505 0%, var(--bg) 280px);
      color: var(--text);
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero,
    .panel {
      background: linear-gradient(180deg, #181818 0%, #121212 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 28px;
      margin-bottom: 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding: 8px 14px 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .brand span {
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 2.7vw, 2.8rem);
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .panel {
      padding: 22px;
    }

    .tag {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--gold-soft);
      color: #f3cb70;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(233, 175, 41, 0.32);
      color: #fff7df;
      text-decoration: none;
      font-weight: 600;
      background: #1b1b1b;
    }

    .home-icon {
      color: var(--gold);
      font-size: 1rem;
      line-height: 1;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="brand">
        <img src="../Setor Fiscal/assets/logo-analise-group.png" alt="Logo da Análise Group">
        <span>Análise Group</span>
      </div>
      <h1>Setor Pessoal</h1>
      <p>Esta pasta está pronta para receber os HTMLs e automações do setor pessoal.</p>
    </section>

    <section class="panel">
      <span class="tag">Estrutura pronta</span>
      <p>Quando você quiser, podemos criar aqui um painel próprio do setor pessoal e começar a adicionar as ferramentas dessa área.</p>
      <a class="action" href="../index.html">
        <span class="home-icon">&#8962;</span>
        <span>Menu Inicial</span>
      </a>
    </section>
  </main>
</body>
</html>
